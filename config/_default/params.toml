# Site description for SEO and Open Graph
description = "Knowckx的个人博客，主要分享 Golang、Python、AI 编程和前端开发等技术实践，也记录金融、科技与生活思考。"

# 站点级关键词，首页和未单独设置关键词的页面会回退到这里
keywords = ["Golang", "Python", "AI编程", "前端开发", "技术博客", "金融", "科技", "生活", "个人博客"]

[seo.person]
name = "Knowckx"
alternateName = "Knowckx"
description = "独立开发者，长期关注 Golang、Python、AI 编程和前端开发。"
url = "/about-me/"
image = "/img/avatar.png"
sameAs = ["https://github.com/Knowckx"]

# Pages placed under these sections will be shown on homepage and archive page.
mainSections = ["post"]
# Output page's full content in RSS.
rssFullContent = true
favicon = "/favicon.ico"

[footer]
since = 2022
customText = ""

[dateFormat]
published = "2006-01-02 15:04:05" # 日期格式 小时需要使用15 而不是03
lastUpdated = "2006-01-02 15:04:05"

# 百度站长平台首页验证
baiduSiteVerification = "codeva-IOIA2BnWrl"

[sidebar]
emoji = "👨🏻‍💻"
subtitle = "\"信仰圣光吧!\" -- 提里奥·弗丁"
# subtitle = "I am a programmer with 8 years of development experience, and my main working languages ​​are Golang and Python."


[sidebar.avatar]
enabled = true
local = true
src = "img/avatar.png"

[article]
headingAnchor = false
math = false
readingTime = true

[article.license]
enabled = true
default = "Licensed under CC BY-NC-SA 4.0"

